<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>B.I. Fretes</title>

<link rel="stylesheet" href="../assets/css/app.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  background:#0c1224;
  color:#fff;
}

/* HEADER */
.bi-header{
  padding:20px;
  border-radius:18px;
  background:linear-gradient(135deg,#111a33,#0c1224);
  margin-bottom:18px;
}

.bi-header h1{
  font-size:20px;
  margin:0;
}

.filters{
  margin-top:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.filters select,
.filters input{
  padding:10px;
  border-radius:10px;
  border:none;
  background:#18244a;
  color:#fff;
}

/* KPI */
.kpis{
  display:grid;
  grid-template-columns: repeat(6,1fr);
  gap:12px;
  margin-bottom:18px;
}

.kpi{
  padding:16px;
  border-radius:16px;
  background:linear-gradient(135deg,#1b2a5a,#111a33);
  box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.kpi h3{
  font-size:12px;
  opacity:.7;
  margin:0;
}

.kpi strong{
  font-size:22px;
}

/* GRID GRÁFICOS */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.card{
  padding:16px;
  border-radius:18px;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(10px);
}

/* RESPONSIVO */
@media(max-width:900px){
  .kpis{ grid-template-columns:1fr 1fr; }
  .grid{ grid-template-columns:1fr; }
}

</style>
</head>

<body>

<div class="bi-header">
  <h1>B.I. Fretes 🚛</h1>

  <div class="filters">
    <select id="fFilial"></select>
    <select id="fCliente"></select>
    <button onclick="loadBI()">Atualizar</button>
  </div>
</div>

<div class="kpis">
  <div class="kpi"><h3>Porta</h3><strong id="kPorta">0</strong></div>
  <div class="kpi"><h3>Trânsito</h3><strong id="kTransito">0</strong></div>
  <div class="kpi"><h3>Total</h3><strong id="kTotal">0</strong></div>
  <div class="kpi"><h3>Volume</h3><strong id="kVolume">0</strong></div>
  <div class="kpi"><h3>Frete Médio</h3><strong id="kFrete">0</strong></div>
  <div class="kpi"><h3>Margem</h3><strong id="kMargem">0</strong></div>
</div>

<div class="grid">
  <div class="card">
    <h3>Veículos por Filial</h3>
    <canvas id="chartFilial"></canvas>
  </div>

  <div class="card">
    <h3>Veículos por Cliente</h3>
    <canvas id="chartCliente"></canvas>
  </div>

  <div class="card">
    <h3>Volume por Filial</h3>
    <canvas id="chartVolume"></canvas>
  </div>

  <div class="card">
    <h3>Porta x Trânsito</h3>
    <canvas id="chartPT"></canvas>
  </div>
</div>

<script src="bi.js"></script>

</body>
</html>
