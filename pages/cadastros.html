<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastros do Sistema | NOVA FROTA</title>

  <link rel="stylesheet" href="../assets/css/app.css" />

  <style>
    :root{
      --nf-blue:#0f172a;
      --nf-blue-2:#102a6b;
      --nf-green:#047857;
      --nf-red:#b91c1c;
      --nf-bg:#f3f6fb;
      --nf-card:#ffffff;
      --nf-border:#dbe2ea;
      --nf-text:#111827;
      --nf-muted:#64748b;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--nf-bg);
      color:var(--nf-text);
      font-family:Arial,Helvetica,sans-serif;
    }

    button,input,select{font:inherit}

    .topbar{
      height:58px;
      background:#0b1120;
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      position:sticky;
      top:0;
      z-index:100;
    }

    .topbar-inner{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .brand img{
      height:34px;
      max-width:180px;
      object-fit:contain;
    }

    .icon-btn{
      width:36px;
      height:36px;
      border:1px solid rgba(255,255,255,.12);
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      cursor:pointer;
      background:rgba(255,255,255,.05);
      text-decoration:none;
    }

    .page{
      max-width:1500px;
      margin:0 auto;
      padding:14px;
    }

    .pageHead{
      background:#fff;
      border:1px solid var(--nf-border);
      border-radius:18px;
      padding:16px;
      box-shadow:0 6px 18px rgba(15,23,42,.06);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }

    .pageHead h1{
      margin:0;
      font-size:20px;
      color:var(--nf-blue);
    }

    .pageHead p{
      margin:5px 0 0;
      color:var(--nf-muted);
      font-size:12px;
    }

    .status{
      font-size:12px;
      font-weight:800;
      color:var(--nf-muted);
    }

    .tabs{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
      background:#fff;
      border:1px solid var(--nf-border);
      border-radius:16px;
      padding:8px;
    }

    .tabBtn{
      height:34px;
      padding:0 13px;
      border:1px solid var(--nf-border);
      border-radius:10px;
      background:#fff;
      color:var(--nf-blue);
      font-size:11px;
      font-weight:900;
      cursor:pointer;
    }

    .tabBtn.active{
      background:var(--nf-blue-2);
      color:#fff;
      border-color:var(--nf-blue-2);
    }

    .toolbar{
      margin-top:12px;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      background:#fff;
      border:1px solid var(--nf-border);
      border-radius:16px;
      padding:10px;
    }

    .search{
      height:34px;
      min-width:260px;
      flex:1 1 340px;
      border:1px solid var(--nf-border);
      border-radius:10px;
      padding:0 11px;
      outline:none;
    }

    .search:focus{
      border-color:#3b82f6;
      box-shadow:0 0 0 3px rgba(59,130,246,.15);
    }

    .btn{
      height:34px;
      border:0;
      border-radius:10px;
      padding:0 13px;
      font-size:11px;
      font-weight:900;
      cursor:pointer;
      color:#fff;
      background:var(--nf-blue);
    }

    .btn.green{background:var(--nf-green)}
    .btn.blue{background:var(--nf-blue-2)}
    .btn.ghost{
      color:var(--nf-blue);
      background:#fff;
      border:1px solid var(--nf-border);
    }
    .btn.red{background:var(--nf-red)}
    .btn:disabled{opacity:.6;cursor:not-allowed}

    .card{
      margin-top:12px;
      background:#fff;
      border:1px solid var(--nf-border);
      border-radius:18px;
      box-shadow:0 6px 18px rgba(15,23,42,.06);
      overflow:hidden;
    }

    .tableWrap{
      overflow:auto;
      min-height:420px;
      max-height:calc(100vh - 260px);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:900px;
    }

    th,td{
      padding:9px 10px;
      border-bottom:1px solid #e5e7eb;
      font-size:11px;
      text-align:left;
      white-space:nowrap;
    }

    th{
      position:sticky;
      top:0;
      z-index:2;
      background:var(--nf-blue);
      color:#fff;
      font-size:10px;
      text-transform:uppercase;
    }

    tbody tr:nth-child(even){background:#f8fafc}
    tbody tr:hover{background:#eef4ff}

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:62px;
      height:23px;
      padding:0 8px;
      border-radius:999px;
      font-size:10px;
      font-weight:900;
    }

    .pill.on{background:#dcfce7;color:#166534}
    .pill.off{background:#fee2e2;color:#991b1b}

    .actionsCell{
      display:flex;
      align-items:center;
      gap:5px;
    }

    .mini{
      height:27px;
      border-radius:8px;
      border:1px solid var(--nf-border);
      background:#fff;
      color:var(--nf-blue);
      font-size:10px;
      font-weight:900;
      cursor:pointer;
      padding:0 9px;
    }

    .mini.edit{border-color:#93c5fd;color:#1d4ed8;background:#eff6ff}
    .mini.toggle{border-color:#fca5a5;color:#991b1b;background:#fff1f2}

    .empty{
      text-align:center;
      padding:35px;
      color:var(--nf-muted);
      font-weight:800;
    }

    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:rgba(15,23,42,.58);
      backdrop-filter:blur(5px);
      z-index:1000;
    }

    .modal.show{display:flex}

    .modalCard{
      width:min(760px,100%);
      max-height:calc(100vh - 36px);
      overflow:hidden;
      background:#fff;
      border-radius:18px;
      box-shadow:0 24px 60px rgba(0,0,0,.28);
      display:flex;
      flex-direction:column;
    }

    .modalHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 16px;
      border-bottom:1px solid var(--nf-border);
      background:#f8fafc;
    }

    .modalHead h2{
      margin:0;
      font-size:16px;
      color:var(--nf-blue);
    }

    .close{
      width:34px;
      height:34px;
      border:1px solid var(--nf-border);
      border-radius:10px;
      background:#fff;
      font-weight:900;
      cursor:pointer;
    }

    .modalBody{
      padding:16px;
      overflow:auto;
    }

    .formGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .field.full{grid-column:1/-1}

    .field label{
      display:block;
      margin-bottom:5px;
      font-size:11px;
      font-weight:900;
      color:var(--nf-blue);
    }

    .field input,.field select{
      width:100%;
      height:36px;
      border:1px solid var(--nf-border);
      border-radius:10px;
      padding:0 10px;
      outline:none;
      text-transform:uppercase;
    }

    .field input[type="email"]{text-transform:none}

    .field input:focus,.field select:focus{
      border-color:#3b82f6;
      box-shadow:0 0 0 3px rgba(59,130,246,.14);
    }

    .hint{
      margin-top:5px;
      font-size:10px;
      color:var(--nf-muted);
    }

    .modalFoot{
      display:flex;
      justify-content:flex-end;
      gap:8px;
      padding:12px 16px;
      border-top:1px solid var(--nf-border);
      background:#f8fafc;
    }

    @media(max-width:700px){
      .formGrid{grid-template-columns:1fr}
      .field.full{grid-column:auto}
      .page{padding:8px}
      .search{min-width:100%}
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <a class="icon-btn" href="./home.html" title="Voltar">🏠</a>
        <img src="../assets/img/logo-novafrota.png" alt="NOVA FROTA" />
      </div>
      <div class="icon-btn" data-logout title="Sair">↩️</div>
    </div>
  </div>

  <main class="page">
    <section class="pageHead">
      <div>
        <h1>Cadastros do Sistema</h1>
        <p>Gerencie usuários, regionais, filiais, clientes, contatos e funcionários.</p>
      </div>
      <div class="status" id="cadStatus">🔄 Carregando...</div>
    </section>

    <nav class="tabs" id="tabs">
      <button class="tabBtn active" data-tab="usuarios" type="button">Usuários</button>
      <button class="tabBtn" data-tab="regionais" type="button">Regionais</button>
      <button class="tabBtn" data-tab="filiais" type="button">Filiais</button>
      <button class="tabBtn" data-tab="clientes" type="button">Clientes</button>
      <button class="tabBtn" data-tab="contatos" type="button">Contatos</button>
      <button class="tabBtn" data-tab="funcionarios" type="button">Funcionários</button>
    </nav>

    <section class="toolbar">
      <input class="search" id="buscaCadastro" placeholder="Buscar no cadastro atual..." />
      <button class="btn ghost" id="btnAtualizar" type="button">🔄 Atualizar</button>
      <button class="btn green" id="btnNovo" type="button">+ Novo cadastro</button>
    </section>

    <section class="card">
      <div class="tableWrap">
        <table>
          <thead id="cadHead"></thead>
          <tbody id="cadBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="modal" id="cadModal" aria-hidden="true">
    <div class="modalCard">
      <div class="modalHead">
        <h2 id="modalTitle">Novo cadastro</h2>
        <button class="close" id="btnFecharModal" type="button">✕</button>
      </div>

      <div class="modalBody">
        <form id="cadForm">
          <div class="formGrid" id="formFields"></div>
        </form>
      </div>

      <div class="modalFoot">
        <button class="btn ghost" id="btnCancelar" type="button">Cancelar</button>
        <button class="btn green" id="btnSalvar" type="button">Salvar</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/auth.js?v=3"></script>
  <script src="../assets/js/cadastros.js?v=1"></script>
  <script>
    requireHomeAuth();
    bindLogoutButton();
  </script>
</body>
</html>
