<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Fretes Mercado</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:Arial}

.container{padding:20px}

.header{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

button{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.btn-save{background:#22c55e}
.btn-clear{background:#ef4444}
.btn-print{background:#3b82f6}

.table{
display:flex;
gap:10px;
overflow-x:auto;
}

.regiao{
background:#1e293b;
border-radius:10px;
padding:10px;
min-width:260px;
}

.regiao h3{
text-align:center;
margin-bottom:8px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:4px;
margin-bottom:4px;
}

input,select{
width:100%;
padding:4px;
background:#0f172a;
color:#fff;
border:1px solid rgba(255,255,255,.1);
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>FRETES MERCADO</h2>

<div>
<button class="btn-save" onclick="salvar()">Salvar</button>
<button class="btn-clear" onclick="zerar()">Zerar</button>
<button class="btn-print" onclick="printTela()">Print</button>
</div>
</div>

<div id="tabela" class="table"></div>

</div>

<script src="../assets/js/fretes-mercado.js"></script>

</body>
</html>
