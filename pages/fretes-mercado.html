<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fretes Mercado | NOVA FROTA</title>

  <link rel="stylesheet" href="../assets/css/app.css" />
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>
    :root{
      --bg:#0f172a;
      --card:#1e293b;
      --line:rgba(255,255,255,.08);
      --text:#f8fafc;
      --muted:#94a3b8;
      --green:#22c55e;
      --red:#ef4444;
      --blue:#3b82f6;
      --shadow:0 10px 24px rgba(0,0,0,.24);
      --radius:14px;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, sans-serif;
    }

    body{
      overflow-x:hidden;
    }

    .container{
      padding:12px;
      max-width:100%;
    }

    .pageHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    .titleWrap{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .titleLogo{
      height:30px;
      width:auto;
      object-fit:contain;
      filter:drop-shadow(0 4px 12px rgba(0,0,0,.20));
    }

    .pageHeader h1{
      margin:0;
      font-size:16px;
      font-weight:1000;
      letter-spacing:.02em;
    }

    .headerActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .btnAction{
      padding:8px 14px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:900;
      font-size:12px;
      color:#fff;
      box-shadow:var(--shadow);
      transition:transform .12s ease, filter .12s ease;
    }

    .btnAction:hover{
      transform:translateY(-1px);
      filter:brightness(1.05);
    }

    .btnAction.green{ background:linear-gradient(135deg,#16a34a,#22c55e); }
    .btnAction.red{ background:linear-gradient(135deg,#dc2626,#ef4444); }
    .btnAction.blue{ background:linear-gradient(135deg,#2563eb,#3b82f6); }

    .statusBar{
      margin-bottom:10px;
      font-size:11px;
      font-weight:900;
      color:#93c5fd;
    }

    .table{
      display:flex;
      gap:8px;
      overflow-x:auto;
      overflow-y:hidden;
      padding-bottom:6px;
      scroll-behavior:smooth;
    }

    .table::-webkit-scrollbar{
      height:8px;
    }

    .table::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,.18);
      border-radius:999px;
    }

    .regiao{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px;
      min-width:210px;
      width:210px;
      box-shadow:var(--shadow);
      flex:0 0 210px;
    }

    .regiao h3{
      text-align:center;
      margin:0 0 8px;
      font-size:12px;
      font-weight:1000;
      letter-spacing:.01em;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
      margin-bottom:6px;
      align-items:center;
    }

    .row.header{
      margin-bottom:6px;
    }

    .row.header b{
      font-size:9px;
      text-transform:uppercase;
      color:#cbd5e1;
      letter-spacing:.04em;
    }

    input{
      width:100%;
      padding:6px 8px;
      background:#0f172a;
      color:#fff;
      border:1px solid rgba(255,255,255,.10);
      border-radius:8px;
      outline:none;
      min-height:30px;
      font-size:10px;
    }

    input[readonly]{
      opacity:1;
      background:#0b1327;
      color:#fff;
    }

    .baseInput{
      font-weight:800;
    }

    .freteInput{
      text-align:right;
      font-size:10px;
    }

    @media (max-width: 900px){
      .pageHeader{
        align-items:flex-start;
      }

      .pageHeader h1{
        font-size:15px;
      }

      .regiao{
        min-width:190px;
        width:190px;
        flex-basis:190px;
      }
    }

    @page{
      size: A4 landscape;
      margin: 6mm;
    }

    @media print{
      html, body{
        background:#fff !important;
        color:#000 !important;
        width:297mm;
        height:210mm;
        overflow:hidden !important;
      }

      .topbar,
      .headerActions,
      .statusBar{
        display:none !important;
      }

      .container{
        padding:0 !important;
        width:100% !important;
      }

      .pageHeader{
        margin-bottom:4mm !important;
      }

      .titleLogo{
        height:22px !important;
        filter:none !important;
      }

      .pageHeader h1{
        font-size:14px !important;
        color:#000 !important;
      }

      .table{
        display:flex !important;
        gap:3mm !important;
        overflow:visible !important;
        align-items:flex-start !important;
        width:100% !important;
        transform:scale(.82);
        transform-origin:top left;
      }

      .regiao{
        break-inside:avoid;
        page-break-inside:avoid;
        color:#000 !important;
        background:#fff !important;
        box-shadow:none !important;
        border:1px solid #cfcfcf !important;
        width:38mm !important;
        min-width:38mm !important;
        flex:0 0 38mm !important;
        padding:2.5mm !important;
      }

      .regiao h3{
        font-size:9px !important;
        margin-bottom:2mm !important;
        color:#000 !important;
      }

      .row{
        gap:1.5mm !important;
        margin-bottom:1.5mm !important;
      }

      .row.header b{
        font-size:6.5px !important;
        color:#000 !important;
      }

      input{
        color:#000 !important;
        background:#fff !important;
        border:1px solid #bbb !important;
        min-height:7mm !important;
        padding:1.2mm 1.6mm !important;
        font-size:7px !important;
      }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <button id="btnHomeMercado" class="burger" type="button" title="Home">🏠</button>
        <img src="../assets/img/logo-novafrota.png" alt="NOVA FROTA" />
      </div>

      <div class="actions">
        <button id="btnSairMercado" class="icon-btn" type="button">SAIR</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="pageHeader">
      <div class="titleWrap">
        <h1>FRETES MERCADO</h1>
      </div>

      <div class="headerActions">
        <button id="btnSalvarMercado" class="btnAction green" type="button">Salvar</button>
        <button id="btnZerarMercado" class="btnAction red" type="button">Zerar</button>
        <button id="btnPrintMercado" class="btnAction blue" type="button">Print</button>
      </div>
    </div>

    <div id="statusMercado" class="statusBar">🔄 Carregando...</div>

    <div id="tabela" class="table"></div>
  </div>

  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/fretes-mercado.js"></script>
  <script>
    requireHomeAuth();
    bindLogoutButton();
  </script>
</body>
</html>
