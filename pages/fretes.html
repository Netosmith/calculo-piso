<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- 🔥 anti-cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Administrativo | NOVA FROTA</title>

  <link rel="stylesheet" href="../assets/css/app.css?v=1" />
  <link rel="stylesheet" href="../assets/css/administrativo.css?v=1" />
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <a class="burger" href="./home.html" title="Voltar"><div></div></a>
        <img src="../assets/img/logo-novafrota.png" alt="NOVA FROTA" />
      </div>

      <div class="actions">
        <button class="icon-btn" id="btnTopSolic" type="button" title="Solicitações">
          📋 <span class="badge" id="badgeTopSolic">0</span>
        </button>

        <div class="icon-btn" title="Configurações">⚙️</div>
        <div class="icon-btn" title="Sair" data-logout>👤</div>
      </div>
    </div>
  </div>

  <section class="hero admin-hero">
    <div class="container hero-content admin-wrap adminPage">

      <div class="admin-head">
        <div class="admin-title">
          <div class="admin-title-row">
            <div class="admin-gear">⚙️</div>
            <div>
              <div class="admin-h1">ADMINISTRATIVO</div>
              <div class="admin-sub">Central de rotinas internas.</div>
              <div class="admin-sync" id="adminSyncStatus">✅ Pronto</div>
            </div>
          </div>
        </div>
      </div>

      <div class="admin-tabs">
        <button class="tabBtn" data-tab="frota">Frota Leve</button>
        <button class="tabBtn isActive" data-tab="cheques">Cheques</button>
      </div>

      <div class="admin-panel">

        <!-- ================= CHEQUES ================= -->
        <div class="view isActive" id="view-cheques">
          <div class="chequesBox">

            <div class="nfTableWrap">
              <table class="nfTable">
                <thead>
                  <tr>
                    <th>Filial</th>
                    <th>Data</th>
                    <th>Sequência</th>
                    <th>Responsável</th>
                    <th>Status</th>
                    <th>Termo</th>
                    <th>Upload</th>
                    <th>Arquivo</th>
                  </tr>
                </thead>

                <tbody id="chequesTbody">
                  <!-- JS vai montar -->
                </tbody>
              </table>
            </div>

          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- 🔥 INPUT OCULTO DE UPLOAD -->
  <input
    type="file"
    id="chequeFileInput"
    accept=".pdf,.jpg,.jpeg,.png"
    style="display:none"
  />

  <script src="../assets/js/auth.js?v=1"></script>
  <script src="../assets/js/administrativo.js?v=1"></script>

  <script>
    requireHomeAuth();
    bindLogoutButton();
  </script>
</body>
</html>
