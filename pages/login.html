<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | NOVA FROTA</title>
  <link rel="stylesheet" href="../assets/css/app.css" />
  <style>
    .state-modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);z-index:9999;padding:18px;}
    .state-modal.show{display:flex;}
    .state-card{width:min(560px,100%);background:linear-gradient(180deg,rgba(17,26,51,.92),rgba(13,20,48,.88));border:1px solid rgba(34,48,94,.95);border-radius:18px;padding:16px;box-shadow:0 18px 45px rgba(0,0,0,.35);}
    .state-title{font-weight:900;font-size:18px;margin:0 0 10px;color:#e9eefc;}
    .state-sub{font-size:12px;opacity:.8;margin-bottom:12px;color:#e9eefc;}
    .state-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    @media (max-width:520px){.state-grid{grid-template-columns:1fr;}}
    .ufbtn{border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:14px 12px;color:#fff;font-weight:900;cursor:pointer;text-align:left;transition:transform .08s,filter .15s,box-shadow .15s;user-select:none;}
    .ufbtn small{display:block;opacity:.85;font-weight:700;margin-top:2px;}
    .ufbtn:hover{filter:brightness(1.08);}
    .ufbtn:active{transform:translateY(1px);}
    .ufbtn.active{box-shadow:0 0 0 3px rgba(91,124,250,.25);outline:none;}
    .go{background:linear-gradient(180deg,rgba(40,170,90,.55),rgba(20,90,55,.55));}
    .mt{background:linear-gradient(180deg,rgba(220,120,60,.55),rgba(120,55,25,.55));}
    .mg{background:linear-gradient(180deg,rgba(220,80,120,.55),rgba(120,35,60,.55));}
    .sp{background:linear-gradient(180deg,rgba(70,120,255,.55),rgba(25,55,140,.55));}
    .pr{background:linear-gradient(180deg,rgba(225,190,60,.55),rgba(130,95,20,.55));}
    .sc{background:linear-gradient(180deg,rgba(170,90,220,.55),rgba(90,35,120,.55));}
    .to{background:linear-gradient(180deg,rgba(60,200,190,.55),rgba(20,110,100,.55));}
    .pa{background:linear-gradient(180deg,rgba(80,150,110,.55),rgba(25,90,60,.55));}
    .goadm{background:linear-gradient(180deg,rgba(240,110,170,.55),rgba(200,60,130,.55));}
    .ma{background:linear-gradient(180deg,rgba(80,110,220,.55),rgba(25,45,120,.55));}
    .ba{background:linear-gradient(180deg,rgba(60,190,120,.55),rgba(20,110,70,.55));}
    .state-actions{display:flex;gap:10px;margin-top:14px;justify-content:flex-end;flex-wrap:wrap;}
    .state-actions .btn2{padding:10px 14px;border-radius:14px;border:1px solid rgba(58,83,168,.95);background:linear-gradient(180deg,rgba(27,42,90,.95),rgba(18,30,70,.95));color:#e9eefc;font-weight:900;cursor:pointer;}
    .state-actions .btn2.secondary{border-color:rgba(255,255,255,.16);background:rgba(13,20,48,.55);}
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="head">
        <img src="../assets/img/PORTALFRETELOGO.png" alt="PORTAL FRETE" />
        <div>
          <div style="font-weight:900;font-size:16px">Sistema Operacional</div>
          <div style="font-size:12px;color:rgba(233,238,252,.75)">Acesso restrito</div>
        </div>
      </div>

      <label class="label" for="user">Usuario</label>
      <input class="input" id="user" placeholder="Ex.: Joao" autocomplete="username" />

      <label class="label" for="pass">Senha</label>
      <input class="input" id="pass" type="password" placeholder="Digite a senha" autocomplete="current-password" />

      <button class="btn" id="btnLogin" type="button">Entrar</button>

      <div class="err" id="err">Usuario ou senha invalidos.</div>
      <div class="small">Sistema Operacional Unificado</div>
    </div>
  </div>

  <div class="state-modal" id="stateModal" aria-hidden="true">
    <div class="state-card">
      <div class="state-title">Selecionar Estado</div>
      <div class="state-sub">Escolha o estado que você vai acessar agora.</div>
      <div class="state-grid" id="stateGrid"></div>
      <div class="state-actions">
        <button class="btn2 secondary" id="btnStateCancel" type="button">Cancelar</button>
        <button class="btn2" id="btnStateOk" type="button">OK</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/auth.js?v=3"></script>
  <script>
    if(localStorage.getItem("nf_auth_home") === "1" && localStorage.getItem("nf_auth_state")){
      window.location.href = "./home.html";
    }

    const btn = document.getElementById("btnLogin");
    const err = document.getElementById("err");
    const userEl = document.getElementById("user");
    const passEl = document.getElementById("pass");
    const modal = document.getElementById("stateModal");
    const grid = document.getElementById("stateGrid");
    const btnOk = document.getElementById("btnStateOk");
    const btnCancel = document.getElementById("btnStateCancel");

    let pendingStates = [];
    let selectedUF = "";

    const UF_META = {
      GO:{label:"Goiás", cls:"go"},
      GOADM:{label:"Administrativo", cls:"goadm"},
      MT:{label:"Mato Grosso", cls:"mt"},
      MG:{label:"Minas Gerais", cls:"mg"},
      SP:{label:"Sãoo Paulo", cls:"sp"},
      PR:{label:"Paraná¡", cls:"pr"},
      SC:{label:"Santa Catarina", cls:"sc"},
      TO:{label:"Tocantins", cls:"to"},
      PA:{label:"Pará¡", cls:"pa"},
      MA:{label:"Maranhão", cls:"ma"},
      BA:{label:"Bahia", cls:"ba"}
    };

    function openStateModal(states){
      pendingStates = Array.isArray(states) ? states : [];
      selectedUF = pendingStates[0] || "";
      grid.innerHTML = "";

      if(!pendingStates.length){
        err.textContent = "Usuario sem estado liberado na aba USUARIOS.";
        err.style.display = "block";
        return;
      }

      pendingStates.forEach(uf => {
        const code = String(uf || "").trim().toUpperCase();
        const meta = UF_META[code] || {label:code, cls:"sp"};
        const b = document.createElement("button");
        b.type = "button";
        b.className = `ufbtn ${meta.cls}`;
        b.dataset.uf = code;
        b.innerHTML = `${meta.label} <small>${code}</small>`;
        b.onclick = () => {
          selectedUF = code;
          [...grid.querySelectorAll(".ufbtn")].forEach(x => x.classList.remove("active"));
          b.classList.add("active");
        };
        grid.appendChild(b);
      });

      const first = grid.querySelector(".ufbtn");
      if(first) first.classList.add("active");
      modal.classList.add("show");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeStateModal(){
      modal.classList.remove("show");
      modal.setAttribute("aria-hidden", "true");
    }

    async function doLogin(){
      err.style.display = "none";
      err.textContent = "Usuario ou senha inválidos.";

      const u = (userEl.value || "").trim();
      const p = (passEl.value || "").trim();

      if(!u || !p){
        err.textContent = "Informe Usuario e senha.";
        err.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Validando...";

      try{
        const result = await validateLogin(u, p);
        if(!result || !result.ok){
          err.textContent = result?.error || "Usuario ou senha inválidos.";
          err.style.display = "block";
          return;
        }
        openStateModal(result.states || []);
      }catch(e){
        err.textContent = e?.message || "Erro ao validar login.";
        err.style.display = "block";
      }finally{
        btn.disabled = false;
        btn.textContent = "Entrar";
      }
    }

    btn.addEventListener("click", doLogin);
    passEl.addEventListener("keydown", (e) => { if(e.key === "Enter") doLogin(); });
    userEl.addEventListener("keydown", (e) => { if(e.key === "Enter") passEl.focus(); });

    btnCancel.addEventListener("click", () => {
      closeStateModal();
      logoutAll();
    });

    btnOk.addEventListener("click", () => {
      if(!selectedUF){
        alert("Selecione um estado.");
        return;
      }
      setSelectedState(selectedUF);
      closeStateModal();
      window.location.href = "./home.html";
    });

    modal.addEventListener("click", (e) => {
      if(e.target === modal){
        closeStateModal();
        logoutAll();
      }
    });
  </script>
</body>
</html>
