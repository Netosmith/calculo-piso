<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Share Clientes | NOVA FROTA</title>

  <link rel="stylesheet" href="../assets/css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    body.shareLight{ background:#f4f6fb !important; color:#111827 !important; }

    body.shareLight .topbar{
      background:rgba(255,255,255,.88) !important;
      border-bottom:1px solid rgba(15,23,42,.10) !important;
      backdrop-filter: blur(10px);
    }
    body.shareLight .topbar img{filter:none !important}
    body.shareLight .icon-btn{
      background:rgba(15,23,42,.06) !important;
      border:1px solid rgba(15,23,42,.12) !important;
      color:#111827 !important;
    }

    body.shareLight .container{max-width:1650px}

    body.shareLight .card{
      padding:12px;
      overflow:hidden;
      background:#ffffff !important;
      border:1px solid rgba(15,23,42,.10) !important;
      box-shadow:0 10px 26px rgba(15,23,42,.06) !important;
      border-radius:18px;
    }

    .shareHeader{
      display:flex; align-items:center; justify-content:space-between;
      gap:12px; flex-wrap:wrap; padding:4px 2px;
    }
    .shareHeader .titleBox{display:flex; flex-direction:column; gap:4px; min-width:260px;}
    body.shareLight .hTitle{font-weight:1000; font-size:18px; margin:0; color:#111827; line-height:1.1;}

    .btnRow{display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:flex-end;}

    .baseSelector{
      display:flex;
      align-items:center;
      gap:8px;
      height:34px;
      padding:0 10px;
      border:1px solid rgba(15,23,42,.14);
      border-radius:12px;
      background:linear-gradient(180deg, #ffffff, #f3f4f6);
      white-space:nowrap;
    }
    .baseSelector label{
      margin:0 !important;
      font-size:12px !important;
      font-weight:900 !important;
      color:#374151 !important;
      opacity:1 !important;
      white-space:nowrap;
    }
    .baseSelector select{
      width:auto !important;
      min-width:132px;
      height:28px;
      padding:0 30px 0 10px !important;
      border-radius:9px !important;
      border:1px solid rgba(15,23,42,.14) !important;
      background:#ffffff !important;
      color:#111827 !important;
      font-size:12px;
      font-weight:900;
      cursor:pointer;
    }
    .baseSelector.is-loading{
      opacity:.65;
      pointer-events:none;
    }
    body.shareLight .btnSmall{
      height:34px; padding:0 12px; border-radius:12px;
      border:1px solid rgba(15,23,42,.14);
      background:linear-gradient(180deg, #ffffff, #f3f4f6);
      color:#111827; font-weight:900; cursor:pointer; white-space:nowrap;
    }
    body.shareLight .btnSmall.green{
      border-color:rgba(34,197,94,.35);
      background:linear-gradient(180deg, rgba(34,197,94,.18), rgba(34,197,94,.10));
    }
    body.shareLight .btnSmall.blue{
      border-color:rgba(59,130,246,.35);
      background:linear-gradient(180deg, rgba(59,130,246,.18), rgba(59,130,246,.10));
    }

    .topRow{
      display:grid;
      grid-template-columns: 420px 1fr 420px;
      gap:12px; align-items:stretch;
    }
    @media (max-width:1200px){ .topRow{grid-template-columns: 1fr;} }

    .clientRow{
      display:grid;
      grid-template-columns: 140px 1fr;
      gap:10px; align-items:start;
    }
    @media (max-width:1200px){ .clientRow{grid-template-columns: 1fr;} }

    body.shareLight label{
      font-size:11px; font-weight:900; opacity:.9;
      display:block; margin-bottom:6px; color:rgba(17,24,39,.85);
    }
    body.shareLight select{
      width:100%; padding:10px 12px; border-radius:12px;
      border:1px solid rgba(15,23,42,.14);
      background:#ffffff; color:#111827; outline:none;
    }

    .statusBox{ border:1px solid rgba(15,23,42,.12); border-radius:12px; overflow:hidden; background:#fff; }
    .statusBox .statusHead{
      background:#15803D; color:#fff; font-weight:1000; text-align:center;
      padding:8px 10px; font-size:12px; letter-spacing:.04em; text-transform:uppercase;
    }

    .statusList{ display:flex; flex-direction:column; }
    .statusLine{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-top:1px solid rgba(15,23,42,.14);
      background:#fff;
    }
    .statusLine:first-child{ border-top:none; }
    .statusLabel{
      font-weight:900;
      color:rgba(17,24,39,.80);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-size:13px;
      max-width: 240px;
    }
    .statusValue{
      font-weight:1000;
      font-variant-numeric:tabular-nums;
      color:#111827 !important;
      white-space:nowrap;
      min-width:96px;
      text-align:right;
      font-size:13px;
    }

    .corrBox{
      border:1px solid rgba(15,23,42,.12);
      border-radius:12px; overflow:hidden; background:#fff;
      height:100%; display:flex; flex-direction:column; min-height:110px;
    }
    .corrBox .corrHead{
      background:#15803D; color:#fff; font-weight:1000; text-align:center;
      padding:8px 10px; font-size:12px; letter-spacing:.04em; text-transform:uppercase;
    }

    .corrGrid{
      display:grid;
      grid-template-columns: repeat(3, minmax(140px, 1fr));
      gap:6px 14px;
      padding:10px 12px;
      align-content:start;
    }
    @media (max-width:1400px){
      .corrGrid{ grid-template-columns: repeat(2, minmax(160px, 1fr)); }
    }
    @media (max-width:900px){
      .corrGrid{ grid-template-columns: 1fr; }
    }

    .corrItem{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px; padding:2px 0;
      border-bottom:1px dotted rgba(15,23,42,.14);
      font-variant-numeric:tabular-nums;
      min-width:0;
    }
    .corrItem .name{
      font-weight:1000; color:#111827; text-transform:uppercase; font-size:12px;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
      min-width:0;
    }
    .corrItem .qty{ font-weight:1000; color:#111827; font-size:12px; white-space:nowrap; }

    .clientLogoWrap{
      display:flex; align-items:center; justify-content:center;
      background:#ffffff;
      border:1px solid rgba(15,23,42,.10);
      border-radius:16px; padding:14px; min-height:120px; height:100%;
    }
    .clientLogoWrap img{ max-width: 100%; max-height:140px; object-fit:contain; }

    body.shareLight .tableWrap{
      overflow:auto;
      border:1px solid rgba(15,23,42,.10);
      border-radius:14px;
      background:#ffffff;
      height: calc(100vh - 260px);
      min-height: 560px;
    }
    body.shareLight table{
      width:100%;
      border-collapse:collapse;
      min-width:1400px;
    }

    body.shareLight th,
    body.shareLight td{
      height:24px;
      line-height:24px;
      padding:0 8px;
      font-size:12px;
      vertical-align:middle;
      white-space:nowrap;
      color:#111827;
      border:1px solid rgba(15,23,42,.10);
      background:#fff;
    }
    body.shareLight thead th{
      position:sticky; top:0; z-index:3;
      background:#f8fafc;
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.04em;
      color:rgba(17,24,39,.75);
    }
    td.num, th.num{text-align:right}

    body.shareLight .statusPill{
      display:inline-flex; align-items:center; justify-content:center;
      padding:4px 12px;
      border-radius:999px;
      font-weight:1000;
      font-size:11px;
      border:1px solid rgba(15,23,42,.12);
      text-transform:uppercase;
      line-height:1;
    }
    body.shareLight .statusPill.liberado{
      background:rgba(34,197,94,.18);
      border-color:rgba(34,197,94,.35);
      color:#0f3d22;
    }

    .hideFreteEmpresa .col-frete-empresa,
    .hideFreteEmpresa .td-frete-empresa{
      display:none !important;
    }

    body.printMode .topbar{display:none !important;}
    body.printMode .container{padding-top:10px !important;}

    body.printMode #pageShare{
      width:1650px !important;
      max-width:1650px !important;
    }
    body.printMode .container.nfWide{
      max-width:1650px !important;
    }

    body.printMode .topRow{
      grid-template-columns: 420px 1fr 420px !important;
    }
    body.printMode .clientRow{
      grid-template-columns: 140px 1fr !important;
    }
    body.printMode .corrGrid{
      grid-template-columns: repeat(3, minmax(140px, 1fr)) !important;
    }

    body.printMode .tableWrap{
      height:auto !important;
      min-height: 0 !important;
      overflow: visible !important;
    }
    body.printMode table{
      min-width:1400px !important;
    }
  </style>
</head>

<body class="shareLight">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <a class="burger" href="./home.html" title="Voltar">🏠</a>
        <img src="../assets/img/logo-novafrota.png" alt="NOVA FROTA" />
      </div>
      <div class="actions">
        <div class="icon-btn" title="Sair" data-logout>SAIR</div>
      </div>
    </div>
  </div>

  <div class="container nfWide" style="padding-top:12px;" id="pageShare">
    <div class="card">
      <div class="shareHeader">
        <div class="titleBox">
          <div class="hTitle">Share Clientes <span id="syncStatus" style="font-size:12px; opacity:0.7; margin-left:10px;">🔄 Carregando...</span></div>
        </div>

        <div class="btnRow">
          <button class="btnSmall blue" id="btnVoltarFretes" title="Voltar para a base de fretes selecionada">← Voltar para Fretes</button>
          <button class="btnSmall" id="btnReload" title="Recarregar os dados da base selecionada">🔄 Atualizar</button>
          <button class="btnSmall" id="btnToggleFreteEmpresa" title="Ocultar ou mostrar a coluna Frete Empresa">MOSTRAR</button>
          <button class="btnSmall green" id="btnPrint" title="Gerar uma imagem PNG desta tela">🖼️ Gerar Print</button>

          <div class="baseSelector" id="baseSelectorWrap">
            <label for="selBase">🗂️ Base:</label>
            <select id="selBase" aria-label="Selecionar base de fretes">
              <option value="fretes">FRETES GO</option>
              <option value="fretes2">FRETES MT</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div style="height:12px;"></div>

    <div class="topRow">
      <div class="card">
        <div class="clientRow">
          <div>
            <label for="selCliente">Cliente</label>
            <select id="selCliente"></select>
          </div>

          <div class="statusBox">
            <div class="statusHead">Status Cliente</div>
            <div class="statusList">
              <div class="statusLine">
                <div class="statusLabel">Total de Lotes</div>
                <div class="statusValue" id="kLotes">0</div>
              </div>
              <div class="statusLine">
                <div class="statusLabel">Total de Caminhões</div>
                <div class="statusValue" id="kCaminhao">0</div>
              </div>
              <div class="statusLine">
                <div class="statusLabel">Projeção de Volume</div>
                <div class="statusValue" id="kVolume">0</div>
              </div>
            </div>
          </div>

        </div>
      </div>

      <div class="card">
        <div class="corrBox">
          <div class="corrHead">Quantidade por Corredor</div>
          <div class="corrGrid" id="corrList"></div>
        </div>
      </div>

      <div class="card">
        <div class="clientLogoWrap">
          <img id="imgLogo" alt="Logo do cliente" style="display:none;" />
          <div id="logoFallback" class="clientLogoFallback" style="display:none;">SEM LOGO</div>
        </div>
      </div>
    </div>

    <div style="height:12px;"></div>

    <div class="card">
      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Origem</th>
              <th>Coleta</th>
              <th>Destino</th>
              <th>Descarga</th>
              <th class="num col-frete-empresa">Frete Empresa</th>
              <th>Produto</th>
              <th class="num">Porta</th>
              <th class="num">Trânsito</th>
              <th class="num">Total Geral</th>
              <th>Status</th>
              <th>Observação</th>
            </tr>
          </thead>
          <tbody id="tbodyShare"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../assets/js/auth.js"></script>

  <script>
    requireHomeAuth();
    bindLogoutButton();
  </script>
  <script src="../assets/js/share-clientes.js?v=3"></script>
</body>
</html>
